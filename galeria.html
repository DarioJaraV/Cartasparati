<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galería - Mis Cartas</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Caveat:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="stylegaleria.css">
</head>
<body>

    <div id="editor-panel" class="hidden">
        <h3>Modo Editor</h3>
        <p id="edit-status">Selecciona una carta para editar</p>
        <label>Título:</label>
        <input type="text" id="editTitle">
        <label>Mensaje:</label>
        <textarea id="editMsg" rows="6"></textarea>
        <label>Color del Sobre:</label>
        <input type="color" id="editColor">
        <div class="editor-buttons">
            <button onclick="saveChanges()" class="btn-primary">Guardar Localmente</button>
            <button onclick="exportarCodigo()" style="background: #28a745; color: white; border: none; padding: 10px; border-radius: 8px; cursor: pointer; margin-top: 5px;">Generar Código para GitHub</button>
            <button onclick="crearNuevaCarta()" class="btn-secondary" style="margin-top: 5px;">+ Nueva Carta</button>
        </div>
        <p style="font-size: 0.8rem; color: #666; margin-top: 10px;">* Al terminar, usa "Generar Código" y pega el resultado en tu archivo de GitHub para que ella lo pueda ver.</p>
    </div>

    <div class="gallery-container">
        <header>
            <div class="main-title">
                <h1>Tus Cartas</h1>
                <div class="title-underline"></div>
            </div>
            <p id="instrucciones">✨ Presiona una carta para leer ✨</p>
        </header>
        <div class="cards-grid" id="contenedor-sobres"></div>
        <div class="footer-links">
            <a href="index.html" class="logout-btn" onclick="localStorage.removeItem('currentUser')">Cerrar Sesión</a>
        </div>
    </div>

    <div id="modal" class="modal hidden">
        <div class="overlay" onclick="closeLetter()"></div>
        <div class="paper">
            <button class="close-btn" onclick="closeLetter()">✕</button>
            <div class="red-line"></div>
            <div id="text" class="note-content"></div>
        </div>
    </div>

    <script>
        const user = localStorage.getItem('currentUser');
        let cartaSeleccionadaIdx = null;

        if (!user) window.location.href = 'index.html';

        // ============================================================
        // AQUÍ ES DONDE PEGAS EL CÓDIGO QUE GENERES PARA GITHUB
        // ============================================================
        function getCartas() {
            // Intenta cargar lo que has editado tú en este navegador
            const locales = localStorage.getItem('misCartas');
            if (user === 'admin' && locales) return JSON.parse(locales);

            // ESTE ES EL CONTENIDO "DE FÁBRICA" QUE ELLA VERÁ
            return [
                { "titulo": "Para mi niña", "mensaje": "Escribe aquí tu primer mensaje largo y romántico...", "color": "#ff9a9e" },
                { "titulo": "Recuerdos", "mensaje": "Aquí puedes poner otro mensaje especial...", "color": "#fecfef" }
            ];
        }

        let misCartas = getCartas();

        if (user === 'admin') {
            document.getElementById('editor-panel').classList.remove('hidden');
        }

        function render() {
            const cont = document.getElementById('contenedor-sobres');
            cont.innerHTML = '';
            misCartas.forEach((c, i) => {
                const wrap = document.createElement('div');
                wrap.className = 'envelope-wrapper';
                wrap.innerHTML = `
                    <div class="envelope" onclick="selectLetter(${i})" style="--bg: ${c.color}">
                        <div class="letter-preview"></div>
                        <div class="pocket"></div>
                        <div class="flap"></div>
                    </div>
                    <span class="label">${c.titulo}</span>
                `;
                cont.appendChild(wrap);
            });
        }

        function selectLetter(i) {
            cartaSeleccionadaIdx = i;
            if(user === 'admin') {
                document.getElementById('editTitle').value = misCartas[i].titulo;
                document.getElementById('editMsg').value = misCartas[i].mensaje;
                document.getElementById('editColor').value = misCartas[i].color;
            } else {
                document.getElementById('text').innerText = misCartas[i].mensaje;
                document.getElementById('modal').classList.remove('hidden');
            }
        }

        function saveChanges() {
            if(cartaSeleccionadaIdx !== null) {
                misCartas[cartaSeleccionadaIdx].titulo = document.getElementById('editTitle').value;
                misCartas[cartaSeleccionadaIdx].mensaje = document.getElementById('editMsg').value;
                misCartas[cartaSeleccionadaIdx].color = document.getElementById('editColor').value;
                localStorage.setItem('misCartas', JSON.stringify(misCartas));
                render();
                alert("Guardado en este navegador. ¡No olvides subir el código a GitHub!");
            }
        }

        function crearNuevaCarta() {
            misCartas.push({ titulo: "Nueva Carta", mensaje: "Mensaje...", color: "#ffffff" });
            render();
        }

        function exportarCodigo() {
            const data = JSON.stringify(misCartas, null, 4);
            prompt("COPIA ESTO y pégalo dentro del 'return [ ... ]' en el código de GitHub:", data);
        }

        function closeLetter() { document.getElementById('modal').classList.add('hidden'); }
        render();
    </script>
</body>
</html>
