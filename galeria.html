<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galería - Mis Cartas</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Caveat:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="stylegaleria.css">
</head>
<body>

    <div id="editor-panel" class="hidden">
        <h3>Modo Editor (Nube)</h3>
        <p id="edit-status">Selecciona una carta para editar</p>
        <label>Título:</label>
        <input type="text" id="editTitle">
        <label>Mensaje:</label>
        <textarea id="editMsg" rows="6"></textarea>
        <label>Color:</label>
        <input type="color" id="editColor">
        <div class="editor-buttons">
            <button id="btnGuardar" class="btn-primary">Guardar en la Nube</button>
            <button id="btnNueva" class="btn-secondary">+ Nueva Carta</button>
            <button id="btnEliminar" style="background: #ff3b30; color: white; border: none; padding: 10px; border-radius: 8px; cursor: pointer;" class="hidden">Eliminar</button>
        </div>
    </div>

    <div class="gallery-container">
        <header>
            <div class="main-title">
                <h1>Tus Cartas</h1>
                <div class="title-underline"></div>
            </div>
            <p id="instrucciones">Presiona una carta para leer</p>
        </header>
        <div class="cards-grid" id="contenedor-sobres"></div>
        <div class="footer-links">
            <a href="index.html" class="logout-btn" onclick="localStorage.removeItem('currentUser')">Cerrar Sesión</a>
        </div>
    </div>

    <div id="modal" class="modal hidden">
        <div class="overlay" id="modalOverlay"></div>
        <div class="paper">
            <button class="close-btn" id="btnClose">✕</button>
            <div class="red-line"></div>
            <div id="text" class="note-content" style="white-space: pre-wrap;"></div>
        </div>
    </div>

    <script type="module">
        // Importar Firebase
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // Configuración de tu proyecto
        const firebaseConfig = {
            apiKey: "AIzaSyAG1ae4KiQopG_k4dY93jitMnszBQRwkxY",
            authDomain: "cartasamor-449ed.firebaseapp.com",
            projectId: "cartasamor-449ed",
            storageBucket: "cartasamor-449ed.firebasestorage.app",
            messagingSenderId: "282533030210",
            appId: "1:282533030210:web:7827acfeb9b33e731b00db",
            measurementId: "G-MWBZWFK3T5"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const docRef = doc(db, "datos", "cartas_usuario");

        const user = localStorage.getItem('currentUser');
        let misCartas = [];
        let cartaSeleccionadaIdx = null;

        if (!user) window.location.href = 'index.html';
        if (user === 'admin') document.getElementById('editor-panel').classList.remove('hidden');

        async function cargarCartas() {
            try {
                const docSnap = await getDoc(docRef);
                if (docSnap.exists()) {
                    misCartas = docSnap.data().lista;
                    console.log("Cartas recuperadas con éxito");
                } else {
                    // SI NO EXISTE, NO SOBRESCRIBIMOS CON VACÍO
                    console.log("No se encontraron cartas en la nube. Crea una nueva para empezar.");
                    misCartas = []; 
                }
                render();
            } catch (e) { 
                console.error("Error de conexión:", e);
                alert("Hubo un error al conectar con la base de datos. Tus cartas no se han borrado, intenta recargar.");
            }
        }
            render();
        }

        function render() {
            const cont = document.getElementById('contenedor-sobres');
            cont.innerHTML = '';
            misCartas.forEach((c, i) => {
                const wrap = document.createElement('div');
                wrap.className = 'envelope-wrapper';
                wrap.innerHTML = `
                    <div class="envelope" id="env-${i}" style="--bg: ${c.color}">
                        <div class="letter-preview"></div>
                        <div class="pocket"></div>
                        <div class="flap"></div>
                    </div>
                    <span class="label">${c.titulo}</span>
                `;
                wrap.querySelector('.envelope').onclick = () => selectLetter(i);
                cont.appendChild(wrap);
            });
        }

        function selectLetter(i) {
            cartaSeleccionadaIdx = i;
            if(user === 'admin') {
                document.getElementById('editTitle').value = misCartas[i].titulo;
                document.getElementById('editMsg').value = misCartas[i].mensaje;
                document.getElementById('editColor').value = misCartas[i].color;
                document.getElementById('btnEliminar').classList.remove('hidden');
                document.getElementById('edit-status').innerText = "Editando: " + misCartas[i].titulo;
            } else {
                document.getElementById('text').innerText = misCartas[i].mensaje;
                document.getElementById('modal').classList.remove('hidden');
            }
        }

        // Guardar cambios en la nube
        document.getElementById('btnGuardar').onclick = async () => {
            if(cartaSeleccionadaIdx !== null) {
                misCartas[cartaSeleccionadaIdx].titulo = document.getElementById('editTitle').value;
                misCartas[cartaSeleccionadaIdx].mensaje = document.getElementById('editMsg').value;
                misCartas[cartaSeleccionadaIdx].color = document.getElementById('editColor').value;
                
                await setDoc(docRef, { lista: misCartas });
                render();
                alert("¡Sincronizado con la Nube!");
            }
        };

        document.getElementById('btnNueva').onclick = async () => {
            misCartas.push({ titulo: "Nueva Carta", mensaje: "Escribe algo...", color: "#ffffff" });
            await setDoc(docRef, { lista: misCartas });
            render();
        };

        document.getElementById('btnEliminar').onclick = async () => {
            if(confirm("¿Borrar esta carta para siempre?")) {
                misCartas.splice(cartaSeleccionadaIdx, 1);
                await setDoc(docRef, { lista: misCartas });
                render();
                document.getElementById('btnEliminar').classList.add('hidden');
            }
        };

        document.getElementById('btnClose').onclick = () => document.getElementById('modal').classList.add('hidden');
        document.getElementById('modalOverlay').onclick = () => document.getElementById('modal').classList.add('hidden');

        cargarCartas();
    </script>
</body>
</html>
